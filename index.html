<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RVF Emergency Roll Call</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A5C; --navy-dark: #122842;
    --teal: #0D8A72; --teal-light: #10A888;
    --orange: #E8792B;
    --bg: #0F1A24; --surface: #162333; --surface-hover: #1C2D40;
    --border: #253A50; --text: #E8ECF1; --text-dim: #8899AA; --text-muted: #5A6E80;
    --present-bg: rgba(13,138,114,0.08);
    --danger: #D64545; --danger-bg: rgba(214,69,69,0.08);
    --offsite-bg: rgba(90,110,128,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'IBM Plex Sans',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .header { position:sticky; top:0; z-index:100; background:var(--navy-dark); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .header-brand { display:flex; align-items:center; gap:10px; }
  .header-logo { width:36px; height:36px; background:var(--teal); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:14px; color:#fff; }
  .header-title { font-weight:700; font-size:16px; letter-spacing:-0.3px; }
  .header-sub { font-size:11px; color:var(--text-dim); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
  .btn-icon { width:38px; height:38px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; font-size:16px; }
  .btn-icon:hover { background:var(--surface-hover); color:var(--text); }

  .stats-bar { display:none; position:sticky; top:63px; z-index:99; background:var(--navy-dark); border-bottom:1px solid var(--border); padding:10px 16px; gap:10px; align-items:center; flex-wrap:wrap; }
  .stats-bar.visible { display:flex; }
  .stat-pill { display:flex; align-items:center; gap:5px; padding:3px 8px; border-radius:6px; font-size:12px; font-weight:600; font-family:'IBM Plex Mono',monospace; }
  .stat-pill.accounted { background:var(--present-bg); color:var(--teal-light); }
  .stat-pill.remaining { background:var(--danger-bg); color:var(--danger); }
  .stat-pill.offsite-pill { background:var(--offsite-bg); color:var(--text-muted); }
  .stat-pill .dot { width:7px; height:7px; border-radius:50%; }
  .stat-pill.accounted .dot { background:var(--teal); }
  .stat-pill.remaining .dot { background:var(--danger); }
  .stat-pill.offsite-pill .dot { background:var(--text-muted); }
  .stat-progress { flex:1; min-width:60px; height:6px; border-radius:3px; background:var(--surface); overflow:hidden; }
  .stat-progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--teal),var(--teal-light)); transition:width 0.4s ease; width:0%; }
  .stat-time { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:var(--orange); min-width:50px; text-align:right; }
  .stat-zone-label { font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

  .landing { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 64px); padding:32px 20px; text-align:center; }
  .landing-icon { width:80px; height:80px; border-radius:22px; background:linear-gradient(135deg,var(--navy),var(--surface)); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:24px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .landing h1 { font-size:26px; font-weight:700; letter-spacing:-0.5px; margin-bottom:6px; }
  .landing p { font-size:14px; color:var(--text-dim); max-width:360px; line-height:1.5; margin-bottom:28px; }

  .zone-section { width:100%; max-width:400px; margin-bottom:20px; }
  .zone-label { font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .zone-grid { display:flex; flex-direction:column; gap:6px; }
  .zone-btn { padding:12px 16px; border:1px solid var(--border); border-radius:10px; background:var(--surface); color:var(--text); text-align:left; font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:space-between; }
  .zone-btn:hover { background:var(--surface-hover); border-color:var(--teal); }
  .zone-btn.selected { background:rgba(13,138,114,0.1); border-color:var(--teal); color:var(--teal-light); }
  .zone-count { font-size:12px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; }
  .zone-btn.selected .zone-count { color:var(--teal); }

  .day-section { margin-bottom:20px; }
  .day-label { font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .day-picker { display:flex; gap:4px; }
  .day-btn { width:40px; height:34px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text-dim); font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .day-btn:hover { background:var(--surface-hover); color:var(--text); }
  .day-btn.active { background:var(--teal); color:#fff; border-color:var(--teal); }

  .btn-start { width:100%; max-width:400px; padding:16px 24px; border:none; border-radius:12px; background:linear-gradient(135deg,var(--orange),#D06A22); color:#fff; font-family:'IBM Plex Sans',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(232,121,43,0.3); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
  .btn-start:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(232,121,43,0.4); }
  .btn-start:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .load-section { display:flex; flex-direction:column; align-items:center; gap:8px; margin-top:8px; }
  .btn-load { padding:8px 16px; border:1px dashed var(--border); border-radius:8px; background:transparent; color:var(--text-dim); font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .btn-load:hover { border-color:var(--teal); color:var(--teal); }
  .load-hint { font-size:10px; color:var(--text-muted); max-width:300px; }
  .roster-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:5px; font-size:11px; font-weight:600; margin-top:8px; }
  .roster-badge.loading { background:rgba(232,121,43,0.1); color:var(--orange); }
  .roster-badge.loaded { background:var(--present-bg); color:var(--teal-light); }
  .roster-badge.error { background:var(--danger-bg); color:var(--danger); }

  .rollcall { display:none; padding:0 0 100px; }
  .rollcall.active { display:block; }
  .search-bar { position:sticky; top:99px; z-index:98; padding:8px 16px; background:var(--bg); }
  .search-wrapper { position:relative; }
  .search-input { width:100%; padding:10px 14px 10px 36px; border:1px solid var(--border); border-radius:10px; background:var(--surface); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.15s; }
  .search-input::placeholder { color:var(--text-muted); }
  .search-input:focus { border-color:var(--teal); }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; pointer-events:none; }

  .filter-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 16px; gap:8px; }
  .filter-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
  .filter-toggle input { display:none; }
  .toggle-track { width:36px; height:20px; border-radius:10px; background:var(--border); position:relative; transition:background 0.2s; }
  .toggle-track::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--text-dim); transition:all 0.2s; }
  .filter-toggle input:checked + .toggle-track { background:var(--teal); }
  .filter-toggle input:checked + .toggle-track::after { left:18px; background:#fff; }
  .toggle-label { font-size:12px; color:var(--text-dim); font-weight:500; }
  .filter-day-display { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-muted); padding:2px 7px; background:var(--surface); border-radius:4px; border:1px solid var(--border); }

  .dept-section { margin:6px 12px 12px; }
  .dept-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--surface); border:1px solid var(--border); border-radius:10px 10px 0 0; cursor:pointer; user-select:none; }
  .dept-header:hover { background:var(--surface-hover); }
  .dept-name { font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.6px; display:flex; align-items:center; gap:8px; }
  .dept-name .chevron { font-size:10px; color:var(--text-muted); transition:transform 0.2s; }
  .dept-header.collapsed .chevron { transform:rotate(-90deg); }
  .dept-counter { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; }
  .dept-counter .present-count { color:var(--teal-light); }
  .dept-counter .total-count { color:var(--text-muted); }
  .dept-list { border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; overflow:hidden; }
  .dept-header.collapsed + .dept-list { display:none; }

  .emp-row { display:flex; align-items:center; padding:11px 14px; border-bottom:1px solid rgba(37,58,80,0.5); cursor:pointer; transition:all 0.15s; user-select:none; gap:10px; }
  .emp-row:last-child { border-bottom:none; }
  .emp-row:hover { background:var(--surface-hover); }
  .emp-check { width:24px; height:24px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:13px; color:transparent; }
  .emp-row.checked .emp-check { background:var(--teal); border-color:var(--teal); color:#fff; }
  .emp-name { font-size:14px; font-weight:500; transition:all 0.2s; flex:1; }
  .emp-row.checked .emp-name { text-decoration:line-through; color:var(--text-muted); }
  .emp-time { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--teal); opacity:0; transition:opacity 0.2s; }
  .emp-row.checked .emp-time { opacity:1; }
  .emp-row.offsite { opacity:0.35; background:var(--offsite-bg); }
  .emp-row.offsite .emp-name { font-style:italic; }
  .emp-badge { font-size:9px; font-weight:700; padding:2px 5px; border-radius:3px; text-transform:uppercase; letter-spacing:0.4px; flex-shrink:0; }
  .emp-badge.off { background:rgba(90,110,128,0.15); color:var(--text-muted); }
  .offsite-divider { padding:5px 14px; font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; background:rgba(90,110,128,0.05); border-bottom:1px solid rgba(37,58,80,0.5); }

  .export-fab { display:none; position:fixed; bottom:20px; right:20px; padding:12px 20px; border:none; border-radius:12px; background:var(--teal); color:#fff; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 20px rgba(13,138,114,0.4); z-index:200; transition:all 0.2s; }
  .export-fab.visible { display:flex; align-items:center; gap:6px; }
  .export-fab:hover { transform:translateY(-2px); }
  .reset-fab { display:none; position:fixed; bottom:20px; left:20px; padding:12px 16px; border:1px solid var(--border); border-radius:12px; background:var(--surface); color:var(--danger); font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; z-index:200; }
  .reset-fab.visible { display:block; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:300; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:500px; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .modal-header { padding:16px 20px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h2 { font-size:17px; font-weight:700; }
  .modal-close { width:32px; height:32px; border:none; border-radius:8px; background:transparent; color:var(--text-dim); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .modal-body { padding:14px 20px; }
  .export-preview { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:'IBM Plex Mono',monospace; font-size:11px; line-height:1.6; color:var(--text-dim); white-space:pre-wrap; max-height:300px; overflow-y:auto; }
  .modal-footer { padding:10px 20px 18px; display:flex; gap:8px; }
  .btn-export { flex:1; padding:11px; border:none; border-radius:10px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .btn-export.primary { background:var(--teal); color:#fff; }
  .btn-export.primary:hover { background:var(--teal-light); }
  .btn-export.secondary { background:var(--navy); color:var(--text); border:1px solid var(--border); }

  .copy-toast { display:none; position:fixed; top:80px; left:50%; transform:translateX(-50%); padding:10px 20px; background:var(--teal); color:#fff; border-radius:8px; font-size:13px; font-weight:600; z-index:400; animation:toastIn 0.3s ease; }
  .copy-toast.show { display:block; }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } }
  @media (min-width:600px) { .rollcall,.search-bar,.filter-bar { max-width:600px; margin-left:auto; margin-right:auto; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .dept-section { animation:fadeUp 0.25s ease both; }
  .dept-section:nth-child(2) { animation-delay:0.04s; }
  .dept-section:nth-child(3) { animation-delay:0.08s; }
  .dept-section:nth-child(4) { animation-delay:0.12s; }
  .dept-section:nth-child(5) { animation-delay:0.16s; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">RV</div>
    <div><div class="header-title">Emergency Roll Call</div><div class="header-sub">River Valley Foods</div></div>
  </div>
  <div><button class="btn-icon" id="btnReset" title="Reset" style="display:none;">&#x21bb;</button></div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-zone-label" id="statZoneLabel"></div>
  <div class="stat-pill accounted"><span class="dot"></span><span id="statPresent">0</span></div>
  <div class="stat-progress"><div class="stat-progress-fill" id="statProgressFill"></div></div>
  <div class="stat-pill remaining"><span class="dot"></span><span id="statRemaining">0</span></div>
  <span id="statOffsiteWrap" style="display:none;"><div class="stat-pill offsite-pill"><span class="dot"></span><span id="statOffsite">0</span> off</div></span>
  <div class="stat-time" id="statTimer">00:00</div>
</div>

<div class="landing" id="landing">
  <div class="landing-icon">&#x1F6A8;</div>
  <h1>Roll Call</h1>
  <p>Select your muster zone and day, then start roll call.</p>
  <div class="zone-section"><div class="zone-label">Select Muster Zone</div><div class="zone-grid" id="zoneGrid"></div></div>
  <div class="day-section"><div class="day-label">Drill Day (for schedule filtering)</div><div class="day-picker" id="dayPicker"></div></div>
  <button class="btn-start" id="btnStart" disabled>Loading roster...</button>
  <div class="load-section">
    <button class="btn-load" id="btnLoadFile">&#x1F4C1; Load Custom Roster CSV</button>
    <div class="load-hint">Accepts: Payroll Name, Home Dept. Description, Schedules, Zone</div>
    <input type="file" id="fileInput" accept=".csv" style="display:none;">
    <div class="roster-badge loading" id="rosterBadge">Loading roster...</div>
  </div>
</div>

<div class="rollcall" id="rollcall">
  <div class="search-bar"><div class="search-wrapper">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by name...">
  </div></div>
  <div class="filter-bar">
    <label class="filter-toggle"><input type="checkbox" id="scheduleFilter" checked><span class="toggle-track"></span><span class="toggle-label">Expected on-site only</span></label>
    <span class="filter-day-display" id="filterDayDisplay"></span>
  </div>
  <div id="deptContainer"></div>
</div>

<button class="export-fab" id="exportFab">&#x1F4CB; Export</button>
<button class="reset-fab" id="resetFab">Reset</button>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-header"><h2>Drill Report</h2><button class="modal-close" id="modalClose">&times;</button></div>
    <div class="modal-body"><div class="export-preview" id="exportPreview"></div></div>
    <div class="modal-footer">
      <button class="btn-export secondary" id="btnCopyExport">Copy</button>
      <button class="btn-export primary" id="btnDownloadExport">Download .txt</button>
    </div>
  </div>
</div>
<div class="copy-toast" id="copyToast">Copied!</div>

<script>
// ═══════════════════════════════════════════════════════════
// ROSTER — loaded from roster.csv in the same directory
// ═══════════════════════════════════════════════════════════
let ROSTER_DATA = {};

// ═══════════════════════════════════════════════════════════
// SCHEDULE PARSER
// ═══════════════════════════════════════════════════════════
const DAY_MAP = {sun:0,mon:1,tue:2,tues:2,wed:3,thu:4,thur:4,thurs:4,fri:5,sat:6};
const DAY_NAMES_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function parseDay(s) {
  const c = s.trim().toLowerCase().replace(/[^a-z]/g,'');
  for (const [f,i] of [['sunday',0],['monday',1],['tuesday',2],['wednesday',3],['thursday',4],['friday',5],['saturday',6]]) { if (c.startsWith(f)) return i; }
  for (const [k,v] of Object.entries(DAY_MAP)) { if (c===k||c.startsWith(k)) return v; }
  return -1;
}
function dayRange(a,b) {
  const s=parseDay(a),e=parseDay(b); if(s===-1||e===-1) return null;
  const d=[]; let x=s; for(let i=0;i<7;i++){d.push(x);if(x===e)break;x=(x+1)%7;} return d;
}
function parseListedDays(s) {
  const parts=s.split(/[,&]+/).map(p=>p.trim()).filter(Boolean), days=[];
  for(const p of parts){if(p.includes('-')){const r=p.split('-').map(x=>x.trim()),rd=dayRange(r[0],r[1]);if(rd)days.push(...rd);}else{const d=parseDay(p);if(d!==-1)days.push(d);}}
  return [...new Set(days)];
}
function getOnsiteDays(str) {
  if(!str||!str.trim()) return null;
  let s=str.trim(); const lo=s.toLowerCase();
  if(lo==='intermittent'||lo==='multi-site') return null;
  s=s.replace(/\(.*?\)/g,'').trim();
  const rm=s.match(/^(.+?)\s+(?:remote|remonte)\s+(.+)$/i);
  if(rm){const b=getOnsiteDays(rm[1]);if(!b)return null;const rd=parseListedDays(rm[2]);return b.filter(d=>!rd.includes(d));}
  const ra=s.match(/^(.+?)\s*-\s*(.+?)\s*&\s*(.+)$/);
  if(ra){const rd=dayRange(ra[1],ra[2]),ex=parseListedDays(ra[3]);if(rd)return[...new Set([...rd,...ex])];}
  const rr=s.match(/^(.+?)\s*-\s*(.+?)\.?$/);
  if(rr&&!s.includes(',')&&!s.includes('&')){const d=dayRange(rr[1],rr[2]);if(d)return d;}
  return parseListedDays(s);
}
function isScheduledOnsite(emp,dayIdx){const d=getOnsiteDays(emp.schedule);if(!d)return true;return d.includes(dayIdx);}

// ═══════════════════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════════════════
function parseCSVLine(line) {
  const f=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(inQ){if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(ch==='"')inQ=false;else cur+=ch;}else{if(ch==='"')inQ=true;else if(ch===','){f.push(cur.trim());cur='';}else cur+=ch;}}
  f.push(cur.trim()); return f;
}

function loadCSVIntoRoster(text) {
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return false;
  const header=parseCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/['"]/g,'').trim());
  const ni=header.findIndex(h=>h.includes('payroll')||h==='name'||h==='employee');
  const di=header.findIndex(h=>h.includes('dept')||h.includes('department')||h==='division');
  const si=header.findIndex(h=>h.includes('schedule')||h==='shift');
  const zi=header.findIndex(h=>h.includes('zone')||h.includes('location')||h.includes('site'));
  if(ni===-1||di===-1) return false;

  const zoneMap={};
  for(let i=1;i<lines.length;i++){
    const cols=parseCSVLine(lines[i]);
    const name=cols[ni],dept=cols[di];
    if(!name) continue;
    const zone=zi!==-1&&cols[zi]?cols[zi]:'All Employees';
    const sched=si!==-1?(cols[si]||''):'';
    if(!zoneMap[zone]) zoneMap[zone]=[];
    zoneMap[zone].push({name,department:dept,schedule:sched});
  }
  ROSTER_DATA=zoneMap;
  return true;
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let selectedZone=null, selectedDay=new Date().getDay();
let checkedSet=new Set(), checkTimes={}, drillStartTime=null, timerInterval=null;

const landing=document.getElementById('landing'), rollcallView=document.getElementById('rollcall');
const deptContainer=document.getElementById('deptContainer'), statsBar=document.getElementById('statsBar');
const statPresent=document.getElementById('statPresent'), statRemaining=document.getElementById('statRemaining');
const statOffsite=document.getElementById('statOffsite'), statOffsiteWrap=document.getElementById('statOffsiteWrap');
const statProgressFill=document.getElementById('statProgressFill'), statTimer=document.getElementById('statTimer');
const statZoneLabel=document.getElementById('statZoneLabel'), searchInput=document.getElementById('searchInput');
const scheduleFilter=document.getElementById('scheduleFilter'), filterDayDisplay=document.getElementById('filterDayDisplay');
const exportFab=document.getElementById('exportFab'), resetFab=document.getElementById('resetFab');
const exportModal=document.getElementById('exportModal'), exportPreview=document.getElementById('exportPreview');
const copyToast=document.getElementById('copyToast'), btnStart=document.getElementById('btnStart');
const btnReset=document.getElementById('btnReset'), rosterBadge=document.getElementById('rosterBadge');

// ═══════════════════════════════════════════════════════════
// INIT — fetch roster.csv from same directory
// ═══════════════════════════════════════════════════════════
async function init() {
  buildDayPicker();
  try {
    const resp = await fetch('roster.csv?t=' + Date.now()); // cache-bust
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const ok = loadCSVIntoRoster(text);
    if (!ok) throw new Error('Parse failed');
    const total = Object.values(ROSTER_DATA).reduce((s,a)=>s+a.length, 0);
    rosterBadge.className = 'roster-badge loaded';
    rosterBadge.textContent = `✓ Roster loaded — ${total} employees`;
    buildZonePicker();
    btnStart.disabled = true;
    btnStart.textContent = 'Select a Zone to Begin';
  } catch(err) {
    console.error('Failed to load roster.csv:', err);
    rosterBadge.className = 'roster-badge error';
    rosterBadge.textContent = '⚠ Could not load roster.csv — use manual upload';
    btnStart.disabled = true;
    btnStart.textContent = 'Upload a Roster to Begin';
  }
}

init();

// Event listeners
btnStart.addEventListener('click', startRollCall);
document.getElementById('btnLoadFile').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', handleFileLoad);
searchInput.addEventListener('input', ()=>renderDepartments(searchInput.value));
scheduleFilter.addEventListener('change', ()=>{renderDepartments(searchInput.value);updateStats();});
exportFab.addEventListener('click', showExport);
resetFab.addEventListener('click', resetRollCall);
btnReset.addEventListener('click', resetRollCall);
document.getElementById('modalClose').addEventListener('click', ()=>exportModal.classList.remove('active'));
document.getElementById('btnCopyExport').addEventListener('click', copyExport);
document.getElementById('btnDownloadExport').addEventListener('click', downloadExport);
exportModal.addEventListener('click', e=>{if(e.target===exportModal)exportModal.classList.remove('active');});

function buildZonePicker() {
  const grid=document.getElementById('zoneGrid'); grid.innerHTML='';
  Object.keys(ROSTER_DATA).forEach(zone=>{
    const btn=document.createElement('button'); btn.className='zone-btn';
    btn.innerHTML=`<span>${zone}</span><span class="zone-count">${ROSTER_DATA[zone].length}</span>`;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); selectedZone=zone;
      btnStart.disabled=false; btnStart.textContent='Start Roll Call';
    });
    grid.appendChild(btn);
  });
}

function buildDayPicker() {
  const picker=document.getElementById('dayPicker');
  DAY_NAMES_SHORT.forEach((name,idx)=>{
    const btn=document.createElement('button');
    btn.className='day-btn'+(idx===selectedDay?' active':'');
    btn.textContent=name;
    btn.addEventListener('click',()=>{selectedDay=idx;document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterDayDisplay.textContent=DAY_NAMES_FULL[idx];});
    picker.appendChild(btn);
  });
  filterDayDisplay.textContent=DAY_NAMES_FULL[selectedDay];
}

function handleFileLoad(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const ok=loadCSVIntoRoster(ev.target.result);
    if(ok){
      const total=Object.values(ROSTER_DATA).reduce((s,a)=>s+a.length,0);
      rosterBadge.className='roster-badge loaded';
      rosterBadge.textContent=`✓ Custom roster — ${total} employees`;
      buildZonePicker(); selectedZone=null;
      btnStart.disabled=true; btnStart.textContent='Select a Zone to Begin';
    } else {
      alert('Could not parse CSV. Need columns: Payroll Name, Home Dept. Description, Schedules, Zone');
    }
  };
  reader.readAsText(file);
}

function getActiveRoster(){return ROSTER_DATA[selectedZone]||[];}

function startRollCall() {
  if(!selectedZone) return;
  landing.style.display='none'; rollcallView.classList.add('active');
  statsBar.classList.add('visible'); exportFab.classList.add('visible');
  resetFab.classList.add('visible'); btnReset.style.display='flex';
  statZoneLabel.textContent=selectedZone;
  filterDayDisplay.textContent=DAY_NAMES_FULL[selectedDay];
  checkedSet.clear(); checkTimes={};
  drillStartTime=new Date(); startTimer(); renderDepartments(); updateStats();
}

function resetRollCall() {
  if(!confirm('Reset roll call? All progress will be lost.')) return;
  clearInterval(timerInterval);
  rollcallView.classList.remove('active'); statsBar.classList.remove('visible');
  exportFab.classList.remove('visible'); resetFab.classList.remove('visible');
  btnReset.style.display='none'; landing.style.display='flex';
  searchInput.value=''; deptContainer.innerHTML='';
}

function startTimer(){clearInterval(timerInterval);timerInterval=setInterval(()=>{const el=Math.floor((Date.now()-drillStartTime.getTime())/1000);statTimer.textContent=`${String(Math.floor(el/60)).padStart(2,'0')}:${String(el%60).padStart(2,'0')}`;},1000);}

function renderDepartments(filter='') {
  deptContainer.innerHTML='';
  const roster=getActiveRoster(), hide=scheduleFilter.checked, depts={};
  roster.forEach((emp,idx)=>{
    if(filter&&!emp.name.toLowerCase().includes(filter.toLowerCase())) return;
    if(!depts[emp.department]) depts[emp.department]=[];
    depts[emp.department].push({...emp,idx,onSite:isScheduledOnsite(emp,selectedDay)});
  });
  Object.keys(depts).sort().forEach(dept=>{
    const all=depts[dept],on=all.filter(e=>e.onSite),off=all.filter(e=>!e.onSite);
    const sf=(a,b)=>{const d=(checkedSet.has(a.idx)?1:0)-(checkedSet.has(b.idx)?1:0);return d||a.name.localeCompare(b.name);};
    on.sort(sf); off.sort(sf);
    const ck=on.filter(e=>checkedSet.has(e.idx)).length;
    let html=on.map(e=>empHTML(e,false)).join('');
    if(!hide&&off.length>0){html+=`<div class="offsite-divider">Not scheduled (${off.length})</div>`;html+=off.map(e=>empHTML(e,true)).join('');}
    const sec=document.createElement('div'); sec.className='dept-section';
    sec.innerHTML=`<div class="dept-header"><div class="dept-name"><span class="chevron">&#x25BC;</span>${dept}</div><div class="dept-counter"><span class="present-count">${ck}</span><span class="total-count"> / ${on.length}</span></div></div><div class="dept-list">${html}</div>`;
    deptContainer.appendChild(sec);
  });
  document.querySelectorAll('.dept-header').forEach(h=>h.addEventListener('click',()=>h.classList.toggle('collapsed')));
  document.querySelectorAll('.emp-row').forEach(r=>r.addEventListener('click',()=>toggleEmployee(parseInt(r.dataset.idx))));
}

function empHTML(emp,off){
  const chk=checkedSet.has(emp.idx),cls=['emp-row'];if(chk)cls.push('checked');if(off)cls.push('offsite');
  const t=chk&&checkTimes[emp.idx]?checkTimes[emp.idx].toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  return `<div class="${cls.join(' ')}" data-idx="${emp.idx}"><div class="emp-check">${chk?'&#x2713;':''}</div><div class="emp-name">${emp.name}</div>${off?'<span class="emp-badge off">OFF</span>':''}<div class="emp-time">${t}</div></div>`;
}

function toggleEmployee(idx){
  if(checkedSet.has(idx)){checkedSet.delete(idx);delete checkTimes[idx];}
  else{checkedSet.add(idx);checkTimes[idx]=new Date();}
  renderDepartments(searchInput.value); updateStats();
}

function updateStats(){
  const roster=getActiveRoster();
  const on=roster.filter((e,i)=>isScheduledOnsite(e,selectedDay));
  const offC=roster.length-on.length;
  const present=[...checkedSet].filter(i=>isScheduledOnsite(roster[i],selectedDay)).length;
  statPresent.textContent=present; statRemaining.textContent=on.length-present;
  statProgressFill.style.width=`${on.length>0?(present/on.length)*100:0}%`;
  if(offC>0){statOffsiteWrap.style.display='inline';statOffsite.textContent=offC;}
  else{statOffsiteWrap.style.display='none';}
}

function generateReport(){
  const now=new Date(),el=Math.floor((now-drillStartTime)/1000);
  const roster=getActiveRoster();
  const on=roster.filter(e=>isScheduledOnsite(e,selectedDay));
  const off=roster.filter(e=>!isScheduledOnsite(e,selectedDay));
  let r=`════════════════════════════════════════════\n  RIVER VALLEY FOODS — ROLL CALL REPORT\n════════════════════════════════════════════\n\n`;
  r+=`Zone:        ${selectedZone}\nDate:        ${now.toLocaleDateString()}\nDay:         ${DAY_NAMES_FULL[selectedDay]}\nStarted:     ${drillStartTime.toLocaleTimeString()}\nElapsed:     ${Math.floor(el/60)}m ${el%60}s\nExpected:    ${on.length} on-site\nAccounted:   ${checkedSet.size}\n`;
  if(off.length) r+=`Not Sched:   ${off.length}\n`;
  r+='\n';
  const depts={};
  on.forEach(emp=>{const idx=roster.indexOf(emp);if(!depts[emp.department])depts[emp.department]=[];depts[emp.department].push({...emp,idx});});
  Object.keys(depts).sort().forEach(dept=>{
    const emps=depts[dept],ck=emps.filter(e=>checkedSet.has(e.idx)).length;
    r+=`── ${dept.toUpperCase()} (${ck}/${emps.length}) ──\n`;
    emps.sort((a,b)=>a.name.localeCompare(b.name)).forEach(emp=>{
      const p=checkedSet.has(emp.idx),t=p&&checkTimes[emp.idx]?` (${checkTimes[emp.idx].toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})})`:'';
      r+=`  ${p?'✓ PRESENT    ':'✗ UNACCOUNTED'}  ${emp.name}${t}\n`;
    }); r+='\n';
  });
  const unacc=on.filter(e=>!checkedSet.has(roster.indexOf(e)));
  r+=`════════════════════════════════════════════\n`;
  if(unacc.length){r+=`  ⚠ UNACCOUNTED PERSONNEL (${unacc.length})\n════════════════════════════════════════════\n`;unacc.forEach(e=>r+=`  • ${e.name} — ${e.department}\n`);}
  else{r+=`  ✓ ALL ON-SITE PERSONNEL ACCOUNTED FOR\n════════════════════════════════════════════\n`;}
  if(off.length){r+=`\n── NOT SCHEDULED (${DAY_NAMES_FULL[selectedDay]}) ──\n`;off.forEach(e=>r+=`  ○ ${e.name} — ${e.department} (${e.schedule})\n`);}
  return r;
}

function showExport(){exportPreview.textContent=generateReport();exportModal.classList.add('active');}
function copyExport(){navigator.clipboard.writeText(generateReport()).then(()=>{copyToast.classList.add('show');setTimeout(()=>copyToast.classList.remove('show'),2000);});}
function downloadExport(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([generateReport()],{type:'text/plain'}));a.download=`RVF_Roll_Call_${selectedZone.replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;a.click();}
</script>
</body>
</html>
